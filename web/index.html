  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

  color: var(--white);\n  font-family: var(--display);\n  min-height: 100vh;\n  border-bottom: 7px solid;\n  border-image: linear-gradient(90deg, var(--purple), var(--claude)) 1;\n}\n.wrap { max-width: 1080px; margin: 0 auto; padding: 0 28px; }\na { color: var(--cyan); text-decoration: none; }\na:hover { text-decoration: underline; }\na:focus-visible, button:focus-visible, input:focus-visible {\n  outline: 2px solid var(--cyan); outline-offset: 2px;\n}\n\n/* ---------- header ---------- */\nheader {\n  display: flex; justify-content: space-between; align-items: baseline;\n  padding: 40px 0 0;\n}\n.wordmark { font-weight: 500; font-size: 22px; letter-spacing: 8px; display: flex; align-items: center; gap: 16px; }\n.mark { width: 34px; height: 34px; border-radius: 9px; flex-shrink: 0;\n  border: 3.5px solid transparent;\n  background: linear-gradient(var(--bg), var(--bg)) padding-box, linear-gradient(135deg, var(--purple), var(--claude)) border-box; }\n.header-right { font-family: var(--mono); font-size: 13px; color: var(--dim); letter-spacing: 1px; }\n\n/* ---------- hero ---------- */\n.hero { padding: 88px 0 56px; }\n.hero .kicker {\n  font-family: var(--mono); font-size: 14px; letter-spacing: 3px;\n  color: var(--dim); margin-bottom: 22px;\n}\n.hero h1 {\n  font-weight: 600; font-size: clamp(38px, 6vw, 66px); line-height: 1.06;\n  max-width: 17ch; margin-bottom: 24px;\n}\n.hero h1 em { font-style: normal; color: var(--claude); }\n.hero .sub {\n  font-size: 19px; color: var(--dim); max-width: 52ch; line-height: 1.55;\n  margin-bottom: 40px;\n}\n.hero .sub strong { color: var(--cell); font-weight: 500; }\n.cta-row { display: flex; gap: 16px; flex-wrap: wrap; align-items: center; }\n.btn {\n  font-family: var(--mono); font-size: 15px; letter-spacing: 1px;\n  padding: 15px 28px; border-radius: 6px; border: none; cursor: pointer;\n  transition: transform 0.08s ease, opacity 0.15s ease;\n  display: inline-block; text-decoration: none; text-align: center;\n}\na.btn:hover { text-decoration: none; }\na.btn-primary { color: var(--white); }\na.btn-ghost { color: var(--cell); }\n.btn:active { transform: translateY(1px); }\n.btn-primary { background: var(--purple); color: var(--white); }\n.btn-primary:hover { opacity: 0.9; }\n.btn-ghost {\n  background: none; color: var(--cell);\n  border: 1.5px solid var(--line);\n}\n.btn-ghost:hover { border-color: var(--dim); }\n\n/* ---------- live demo strip ---------- */\n.demo-strip { padding: 12px 0 68px; }\n.strip-caption {\n  font-family: var(--mono); font-size: 13px; letter-spacing: 2px;\n  color: var(--dim); margin-top: 14px;\n}\n.day-row { display: flex; gap: 9px; flex-wrap: wrap; }\n.day {\n  width: 44px; height: 44px; border-radius: 8px;\n  background: var(--cell);\n}\n.day.empty { background: none; border: 2.5px solid var(--cell-empty); }\n.day.relapse {\n  background: var(--claude); position: relative;\n  box-shadow: 0 0 24px rgba(217,119,87,0.45);\n}\n.day.relapse::before, .day.relapse::after {\n  content: \"\"; position: absolute; inset: 0; margin: auto;\n  width: 22px; height: 4.5px; border-radius: 3px; background: var(--bg);\n}\n.day.relapse::before { transform: rotate(45deg); }\n.day.relapse::after { transform: rotate(-45deg); }\n\n/* ---------- sections ---------- */\nsection { padding: 72px 0; border-top: 1px solid var(--line); }\n#fineprint { padding: 40px 0 48px; }\n#vow, #lookup { padding: 64px 0; }\n.sec-label {\n  font-family: var(--mono); font-size: 13px; letter-spacing: 3px;\n  color: var(--dim); margin-bottom: 34px;\n}\n.steps { display: flex; flex-direction: column; gap: 0; max-width: 720px; }\n.step { display: grid; grid-template-columns: 64px 1fr; gap: 24px; padding: 30px 0; }\n.step + .step { border-top: 1px dashed var(--line); }\n.step .n { color: var(--purple); font-family: var(--mono); font-size: 15px; padding-top: 5px; }\n.step h3 { font-weight: 600; font-size: 21px; margin-bottom: 10px; }\n.step p { color: var(--dim); line-height: 1.6; font-size: 16px; max-width: 5  { margin-top: 34px; display: none; }\n.vow-view.show { display: block; }\n.vow-head { display: flex; justify-content: space-between; align-items: baseline; flex-wrap: wrap; gap: 10px; margin-bottom: 22px; }\n.vow-head .big { font-weight: 600; font-size: 34px; }\n.vow-head .stake { font-family: var(--mono); color: var(--amber); font-size: 16px; }\n.vow-head .stake.lost { color: var(--claude); }\n.verdict {\n  display: inline-block; font-family: var(--mono); letter-spacing: 4px;\n  font-size: 20px; padding: 10px 22px; border: 3px solid; border-radius: 5px;\n  transform: rotate(-4deg); margin: 22px 0 6px;\n}\n.verdict { position: relative; }\n.verdict::after { content: \"\"; position: absolute; inset: 4px; border: 1.5px solid currentColor; border-radius: 3px; opacity: 0.55; pointer-events: none; }\n.verdict.clean { color: var(--cyan); border-color: var(--cyan); }\n.verdict.relapsed { color: var(--claude); border-color: var(--claude); }\n.countdown { font-family: var(--mono); font-size: 14px; color: var(--dim); margin-top: 16px; }\n.countdown b { color: var(--cell); font-weight: 500; }\n\n/* ---------- footer ---------- */\nfooter {\n  border-top: 1px solid var(--line); padding: 42px 0 60px;\n  display: flex; justify-content: space-between; flex-wrap: wrap; gap: 14px;\n  font-family: var(--mono); font-size: 13.5px; color: var(--dim);\n}\n@media (prefers-reduced-motion: no-preference) {\n  .day { transition: opacity 0.5s ease, transform 0.15s ease; }\n}\n@media (max-height: 800px) and (min-width: 760px) {\n  header { padding-top: 26px; }\n  .hero { padding: 48px 0 34px; }\n  .hero .kicker { margin-bottom: 16px; }\n  .hero h1 { font-size: clamp(36px, 5.1vw, 58px); margin-bottom: 20px; }\n  .hero .sub { font-size: 18px; line-height: 1.45; margin-bottom: 30px; }\n  .demo-strip { padding: 0 0 118px; }\n  .day { width: 40px; height: 40px; }\n  .strip-caption { margin-top: 12px; }\n}\n#demoRow .day:hover { transform: translateY(-3px); }\n#demoRow { cursor: default; }\n.hero h1 em { transition: text-decoration-color 0.15s; text-decoration: underline transparent 3px; text-underline-offset: 6px; }\n.hero h1:hover em { text-decoration-color: var(--claude); }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n<div class=\"wrap\">\n\n<header>\n  <div class=\"wordmark\"><div class=\"mark\" aria-hidden=\"true\"><\u002Fdiv>BUILD NOTHING<\u002Fdiv>\n  <div class=\"header-right\">/ WITNESSED ON MONAD<\u002Fdiv>\n<\u002Fheader>\n\n<div class=\"hero\">\n  <div class=\"kicker\">/ A VOW OF ABSTINENCE FROM VIBECODING<\u002Fdiv>\n  <h1>Stake MON on not opening <em>Claude Code<\u002Fem>.<\u002Fh1>\n  <p class=\"sub\">\n    Take a vow. A skill you install <strong>with Claude<\u002Fstrong> snitches on you\n    the moment a session starts, and heartbeats daily to prove you haven't killed it.\n    Survive your vow: take your stake back plus a cut of everyone who broke.\n    Break it: your stake feeds the survivors of your weekly cohort.\n  <\u002Fp>\n  <div class=\"cta-row\">\n    <a class=\"btn btn-primary\" href=\"#vow\">Take the vow<\u002Fa>\n    <a class=\"btn btn-ghost\" href=\"#lookup\">Check a vow<\u002Fa>\n    <a href=\"https://github.com/Zhekinmaksim/buildnothing\" style=\"font-family:var(--mono);font-size:14px;\">contract &amp; skill →<\u002Fa>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<div class=\"demo-strip\">\n  <div class=\"day-row\" id=\"demoRow\" aria-hidden=\"true\"><\u002Fdiv>\n  <div class=\"strip-caption\">ABSTINENCE GRAPH · ONE CELL = ONE DAY WITHOUT CLAUDE CODE<\u002Fdiv>\n<\u002Fdiv>\n\n<section>\n  <div class=\"sec-label\">/ HOW IT WORKS<\u002Fdiv>\n  <div class=\"steps\">\n    <div class=\"step\">\n      <div class=\"n\">01<\u002Fdiv>\n      <div><h3>Vow<\u002Fh3>\n      <p>Pick a duration (1-30 days) and a stake (up to 100 MON, it's unaudited\n      and we say so). Call <code>commit()<\u002Fcode> from your main wallet with the\n      snitch's address. One active vow per address.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"step\">\n      <div class=\"n\">02<\u002Fdiv>\n      <div><h3>The snitch<\u002Fh3>\n      <p>A Claude Code skill installs a <code>SessionStart<\u002Fcode> hook and a daily\n      cron on a dust-funded burner. Open a session and it sends\n      <strong>relapse()<\u002Fstrong>, instantly and publicly. Kill the snitch and\n      the heartbeat dies. A dead heartbeat is a confession.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"step\">\n      <div class=\"n\">03<\u002Fdiv>\n      <div><h3>The settlement<\u002Fh3>\n      <p>Vows settle in weekly cohorts. Survivors split the slashed stakes\n      pro-rata. If nobody survives a week, the pot rolls into a jackpot for\n      the next cohort. No oracles, no randomness. Every outcome is a state\n      check the chain performs on itself.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section id=\"fineprint\">\n  <div class=\"sec-label\">/ THE FINE PRINT, HONESTLY<\u002Fdiv>\n  <div class=\"honesty\">\n    <b>Tamper-evident, not tamper-proof.<\u002Fb> Deleting the snitch auto-slashes you.\n    Surgically removing only the hook while keeping the cron alive defeats the\n    system. That's premeditated fraud against a small-stakes game between\n    consenting degens, and the stake cap is sized for exactly that trust level.\n    The snitch watches Claude Code on one machine; your browser, your second\n    laptop and your honor are between you and your cohort. 48h heartbeat grace:\n    a weekend offline is safe, a week offline is indistinguishable from cheating.\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section id=\"vow\">\n  <div class=\"sec-label\">/ TAKE THE VOW<\u002Fdiv>\n  <div class=\"panel\">\n    <div class=\"field\">\n      <label>DURATION<\u002Flabel>\n      <div class=\"chips\" id=\"vowDuration\">\n        <button type=\"button\" class=\"chip\" data-v=\"86400\">1 day<\u002Fbutton>\n        <button type=\"button\" class=\"chip\" data-v=\"259200\">3 days<\u002Fbutton>\n        <button type=\"button\" class=\"chip on\" data-v=\"604800\">7 days<\u002Fbutton>\n        <button type=\"button\" class=\"chip\" data-v=\"1209600\">14 days<\u002Fbutton>\n        <button type=\"button\" class=\"chip\" data-v=\"2592000\">30 days<\u002Fbutton>\n      <\u002Fdiv>\n      <div class=\"hint\" id=\"durationHint\">a real week<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"field\">\n      <label>STAKE (MON)<\u002Flabel>\n      <input id=\"vowStake\" type=\"number\" min=\"0.1\" max=\"25\" step=\"0.1\" value=\"5\">\n      <div class=\"hint\">max 100 MON. the cap is low because i don't trust my own solidity, and neither should you<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"field\">\n      <label>SNITCH ADDRESS<\u002Flabel>\n      <input id=\"vowSnitch\" type=\"text\" placeholder=\"0x… (from the skill's setup step)\">\n      <div class=\"hint\">run <span style=\"color:var(--cell)\">node scripts/setup.mjs<\u002Fspan> in the skill first - it prints this<\u002Fdiv>\n    <\u002Fdiv>\n    <button class=\"btn btn-primary\" id=\"commitBtn\">Connect wallet &amp; commit<\u002Fbutton>\n    <div class=\"status-line\" id=\"commitStatus\"><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section id=\"lookup\">\n  <div class=\"sec-label\">/ CHECK A VOW<\u002Fdiv>\n  <div class=\"panel\">\n    <div class=\"field\">\n      <label>VOW ID OR ADDRESS<\u002Flabel>\n      <input id=\"lookupInput\" type=\"text\" placeholder=\"1 or 0x…\">\n    <\u002Fdiv>\n    <button class=\"btn btn-ghost\" id=\"lookupBtn\">Look up<\u002Fbutton>\n    <div class=\"status-line\" id=\"lookupStatus\"><\u002Fdiv>\n\n    <div class=\"vow-view\" id=\"vowView\">\n      <div class=\"vow-head\">\n        <div class=\"big\" id=\"vvHeadline\"><\u002Fdiv>\n        <div class=\"stake\" id=\"vvStake\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"day-row\" id=\"vvRow\"><\u002Fdiv>\n      <div class=\"strip-caption\">ABSTINENCE GRAPH · ONE CELL = ONE DAY WITHOUT CLAUDE CODE<\u002Fdiv>\n      <div id=\"vvVerdict\"><\u002Fdiv>\n      <div class=\"countdown\" id=\"vvCountdown\"><\u002Fdiv>\n      <div class=\"cta-row\" style=\"margin-top:26px;\">\n        <button class=\"btn btn-ghost\" id=\"cardBtn\">Download share card<\u002Fbutton>\n        <button class=\"btn btn-primary\" id=\"tweetBtn\">Post it<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<footer>\n  <div>contract: <a id=\"contractLink\" href=\"#\">deploying…<\u002Fa> · vow #1 is mine. watching me is free<\u002Fdiv>\n  <div>built by <a href=\"https://x.com/0maxxdev\">@0maxxdev<\u002Fa> for Monad Spark · <a href=\"https://github.com/Zhekinmaksim/buildnothing\">source<\u002Fa><\u002Fdiv>\n<\u002Ffooter>\n\n<\u002Fdiv>\n\n<script type=\"module\">\n// ---------------- config (fill after deploy) ----------------\nconst CONTRACT = \"0x380b02992E2E0Be93eA31841a0E911D85DE77842\";\nconst RPC = \"https://rpc.monad.xyz\";\nconst CHAIN_ID = \"0x8f\"; // 143 - Monad mainnet (verified)\nconst EXPLORER = \"https://monadvision.com\";\nconst MONAD_PARAMS = {\n  chainId: CHAIN_ID,\n  chainName: \"Monad Mainnet\",\n  nativeCurrency: { name: \"MON\", symbol: \"MON\", decimals: 18 },\n  rpcUrls: [RPC],\n  blockExplorerUrls: [EXPLORER],\n};\nconst MONAD_CHAIN = {\n  id: Number(CHAIN_ID),\n  name: \"Monad Mainnet\",\n  nativeCurrency: { name: \"MON\", symbol: \"MON\", decimals: 18 },\n  rpcUrls: { default: { http: [RPC] } },\n  blockExplorers: { default: { name: \"MonadVision\", url: EXPLORER } },\n};\n\ndocument.getElementById(\"contractLink\").href = `${EXPLORER}/address/${CONTRACT}`;\ndocument.getElementById(\"contractLink\").textContent = CONTRACT.slice(0, 10) + \"…\";\n\n// ---------------- demo strip: a story on loop ----------------\nconst demoRow = document.getElementById(\"demoRow\");\nconst DEMO_DAYS = 14;\nconst demoCells = Array.from({ length: DEMO_DAYS }, () => {\n  const el = document.createElement(\"div\");\n  el.className = \"day empty\";\n  demoRow.appendChild(el);\n  return el;\n});\nfunction renderDemo(clean, relapseAt) {\n  demoCells.forEach((el, d) => {\n    el.className = \"day\" + (d === relapseAt ? \" relapse\" : d < clean ? \"\" : \" empty\");\n    el.style.opacity = (d < clean && d !== relapseAt) ? 0.66 + 0.34 * (d / (DEMO_DAYS - 1)) : \"\";\n  });\n}\n// grow to 14 clean, then hold the cautionary relapse frame for 3 ticks\nconst HOLD = 3;\nlet demoTick = 0;\nrenderDemo(1, -1);\nsetInterval(() => {\n  demoTick = (demoTick + 1) % (DEMO_DAYS + HOLD + 1);\n  if (demoTick <= DEMO_DAYS) renderDemo(demoTick, -1);\n  else renderDemo(6, 5);\n}, 900);\n\n// ---------------- ABI + encoding (viem from CDN) ----------------\nimport { createPublicClient, createWalletClient, custom, http, parseEther, formatEther, encodeFunctionData, decodeFunctionResult } from \"https://esm.sh/viem@2.21.19\";\n\nconst ABI = [\n  { name: \"commit\", type: \"function\", stateMutability: \"payable\",\n    inputs: [{ name: \"duration\", type: \"uint256\" }, { name: \"snitch\", type: \"address\" }],\n    outputs: [{ type: \"uint256\" }] },\n  { name: \"vows\", type: \"function\", stateMutability: \"view\",\n    inputs: [{ type: \"uint256\" }],\n    outputs: [\n      { name: \"penitent\", type: \"address\" }, { name: \"snitch\", type: \"address\" },\n      { name: \"start\", type: \"uint64\" }, { name: \"end\", type: \"uint64\" },\n      { name: \"lastBeat\", type: \"uint64\" }, { name: \"maxGap\", type: \"uint64\" },\n      { name: \"stake\", type: \"uint128\" }, { name: \"epochId\", type: \"uint32\" },\n      { name: \"status\", type: \"uint8\" }, { name: \"principalOnly\", type: \"bool\" }] },\n  { name: \"activeVowOf\", type: \"function\", stateMutability: \"view\",\n    inputs: [{ type: \"address\" }], outputs: [{ type: \"uint256\" }] },\n  { name: \"vowState\", type: \"function\", stateMutability: \"view\",\n    inputs: [{ type: \"uint256\" }],\n    outputs: [\n      { name: \"status\", type: \"uint8\" }, { name: \"cleanSeconds\", type: \"uint64\" },\n      { name: \"secondsLeft\", type: \"uint64\" }, { name: \"worstGap\", type: \"uint64\" },\n      { name: \"beatOverdue\", type: \"bool\" }] },\n];\n\nconst pub = createPublicClient({ transport: http(RPC) });\n\n// duration chips\nconst DUR_HINTS = { 86400: \"toe in the water\", 259200: \"a long weekend\", 604800: \"a real week\", 1209600: \"two weeks, brave\", 2592000: \"thirty days. who are you\" };\ndocument.querySelectorAll(\"#vowDuration .chip\").forEach((ch) => {\n  ch.onclick = () => {\n    document.querySelectorAll(\"#vowDuration .chip\").forEach((c) => c.classList.remove(\"on\"));\n    ch.classList.add(\"on\");\n    document.getElementById(\"durationHint\").textContent = DUR_HINTS[ch.dataset.v];\n  };\n});\n\nasync function ensureMonad() {\n  try {\n    await window.ethereum.request({ method: \"wallet_switchEthereumChain\", params: [{ chainId: CHAIN_ID }] });\n  } catch (e) {\n    const msg = String(e?.message || \"\");\n    if (e?.code === 4902 || /Unrecognized chain ID|not been added/i.test(msg)) {\n      await window.ethereum.request({ method: \"wallet_addEthereumChain\", params: [MONAD_PARAMS] });\n      await window.ethereum.request({ method: \"wallet_switchEthereumChain\", params: [{ chainId: CHAIN_ID }] });\n    } else {\n      throw e;\n    }\n  }\n  const current = await window.ethereum.request({ method: \"eth_chainId\" });\n  if (String(current).toLowerCase() !== CHAIN_ID.toLowerCase()) {\n    throw new Error(\"wrong network: switch wallet to Monad Mainnet\");\n  }\n}\n// ---------------- commit flow ----------------\nconst commitStatus = document.getElementById(\"commitStatus\");\ndocument.getElementById(\"commitBtn\").onclick = async () => {\n  try {\n    if (!window.ethereum) { commitStatus.textContent = \"no wallet found - install one that speaks EVM\"; commitStatus.className = \"status-line err\"; return; }\n    const wallet = createWalletClient({ chain: MONAD_CHAIN, transport: custom(window.ethereum) });\n    const [account] = await wallet.requestAddresses();\n    await ensureMonad();\n    const duration = BigInt(document.querySelector(\"#vowDuration .chip.on\").dataset.v);\n    const stake = parseEther(document.getElementById(\"vowStake\").value || \"0\");\n    if (stake <= 0n || stake > 100000000000000000000n) { commitStatus.textContent = \"stake must be between 0 and 100 MON\"; commitStatus.className = \"status-line err\"; return; }\n    const snitch = document.getElementById(\"vowSnitch\").value.trim();\n    if (!/^0x[a-fA-F0-9]{40}$/.test(snitch)) { commitStatus.textContent = \"snitch address missing - run the skill's setup first\"; commitStatus.className = \"status-line err\"; return; }\n    commitStatus.textContent = \"confirm in wallet…\"; commitStatus.className = \"status-line\";\n    const hash = await wallet.sendTransaction({\n      account, to: CONTRACT, value: stake, chain: MONAD_CHAIN,\n      data: encodeFunctionData({ abi: ABI, functionName: \"commit\", args: [duration, snitch] }),\n    });\n    if (!/^0x[a-fA-F0-9]{64}$/.test(hash)) throw new Error(\"wallet returned invalid tx hash\");\n    commitStatus.textContent = \"\";\n    const link = document.createElement(\"a\");\n    link.href = `${EXPLORER}/tx/${hash}`;\n    link.textContent = `${hash.slice(0, 18)}…`;\n    const arm = document.createElement(\"span\");\n    arm.style.color = \"var(--cell)\";\n    arm.textContent = \"node scripts/setup.mjs --arm <vowId>\";\n    commitStatus.append(\"vow committed: \", link, \" - now arm the snitch: \", arm);\n    commitStatus.className = \"status-line ok\";\n  } catch (e) {\n    commitStatus.textContent = (e.shortMessage || e.message || \"failed\").slice(0, 120);\n    commitStatus.className = \"status-line err\";\n  }\n};\n\n// ---------------- lookup + live vow view ----------------\nconst $ = (id) => document.getElementById(id);\nlet currentVow = null;\n\nasync function readVow(vowId) {\n  const [vow, state] = await Promise.all([\n    pub.readContract({ address: CONTRACT, abi: ABI, functionName: \"vows\", args: [vowId] }),\n    pub.readContract({ address: CONTRACT, abi: ABI, functionName: \"vowState\", args: [vowId] }),\n  ]);\n  return { vowId, vow, state };\n}\n\n$(\"lookupBtn\").onclick = async () => {\n  const raw = $(\"lookupInput\").value.trim();\n  const st = $(\"lookupStatus\");\n  st.textContent = \"reading the chain…\"; st.className = \"status-line\";\n  try {\n    let vowId;\n    if (/^0x[a-fA-F0-9]{40}$/.test(raw)) {\n      vowId = await pub.readContract({ address: CONTRACT, abi: ABI, functionName: \"activeVowOf\", args: [raw] });\n      if (vowId === 0n) { st.textContent = \"no active vow for this address\"; st.className = \"status-line err\"; return; }\n    } else {\n      vowId = BigInt(raw || \"0\");\n    }\n    currentVow = await readVow(vowId);\n    if (currentVow.vow[0] === \"0x0000000000000000000000000000000000000000\") {\n      st.textContent = \"vow not found\"; st.className = \"status-line err\"; return;\n    }\n    st.textContent = \"\";\n    renderVow();\n    $(\"vowView\").classList.add(\"show\");\n  } catch (e) {\n    st.textContent = (e.shortMessage || e.message || \"read failed\").slice(0, 120);\n    st.className = \"status-line err\";\n  }\n};\n\nconst STATUS = [\"none\", \"active\", \"relapsed\", \"survived\", \"slashed\"];\nfunction renderVow() {\n  const { vowId, vow, state } = currentVow;\n  const [, , start, end, , , stake, , statusIdx] = vow;\n  const [stStatus, cleanSeconds] = state;\n  const status = STATUS[Number(statusIdx)] ?? STATUS[Number(stStatus)];\n  const vowDays = Math.round(Number(end - start) / 86400);\n  const hours = Math.floor(Number(cleanSeconds) / 3600);\n  const cleanDaysN = Math.min(Math.floor(hours / 24), vowDays);\n  const broke = status === \"relapsed\" || status === \"slashed\";\n\n  $(\"vvHeadline\").textContent = broke ? `Lasted ${hours} hours` : `I built nothing for ${hours} hours`;\n  $(\"vvStake\").textContent = `/ ${formatEther(stake)} MON AT STAKE${broke ? \" — LOST\" : \"\"}`;\n  $(\"vvStake\").className = \"stake\" + (broke ? \" lost\" : \"\");\n\n  const row = $(\"vvRow\");\n  row.innerHTML = \"\";\n  const gapPx = 9;\n  const avail = row.clientWidth || 480;\n  const cell = Math.max(18, Math.min(44, Math.floor((avail - (vowDays - 1) * gapPx) / vowDays)));\n  for (let d = 0; d < vowDays; d++) {\n    const el = document.createElement(\"div\");\n    el.className = \"day\" + (broke && d === cleanDaysN ? \" relapse\" : d < cleanDaysN ? \"\" : \" empty\");\n    el.style.width = el.style.height = cell + \"px\";\n    if (d < cleanDaysN) el.style.opacity = 0.66 + 0.34 * (d / Math.max(vowDays - 1, 1));\n    row.appendChild(el);\n  }\n\n  $(\"vvVerdict\").innerHTML = status === \"active\"\n    ? \"\"\n    : `<span class=\"verdict ${broke ? \"relapsed\" : \"clean\"}\">${broke ? \"RELAPSED\" : \"CLEAN\"}<\u002Fspan>`;\n\n  const cd = $(\"vvCountdown\");\n  if (status === \"active\") {\n    const left = Number(state[2]);\n    cd.innerHTML = `vow #${vowId} · <b>${Math.floor(left / 86400)}d ${Math.floor((left % 86400) / 3600)}h<\u002Fb> until settlement · heartbeat ${state[4] ? \"<b style='color:var(--claude)'>OVERDUE<\u002Fb>\" : \"on time\"}`;\n  } else {\n    cd.textContent = `vow #${vowId} · ${status}`;\n  }\n}\n\n// ---------------- share card (canvas render of the design system) ----------\nfunction drawCard() {\n  const { vowId, vow, state } = currentVow;\n  const [, , start, end, , , stake, , statusIdx] = vow;\n  const status = STATUS[Number(statusIdx)];\n  const broke = status === \"relapsed\" || status === \"slashed\";\n  const vowDays = Math.round(Number(end - start) / 86400);\n  const hours = Math.floor(Number(state[1]) / 3600);\n  const cleanDaysN = Math.min(Math.floor(hours / 24), vowDays);\n\n  const W = 1200, H = 675;\n  const c = document.createElement(\"canvas\"); c.width = W; c.height = H;\n  const x = c.getContext(\"2d\");\n  const g = x.createRadialGradient(W * 0.38, H * 0.2, 60, W * 0.38, H * 0.2, W);\n  g.addColorStop(0, \"#1A1230\"); g.addColorStop(1, \"#0E091C\");\n  x.fillStyle = g; x.fillRect(0, 0, W, H);\n  const rail = x.createLinearGradient(0, 0, W, 0);\n  rail.addColorStop(0, \"#6E54FF\"); rail.addColorStop(1, \"#D97757\");\n  x.fillStyle = rail; x.fillRect(0, H - 7, W, 7);\n\n  x.fillStyle = \"#FFFFFF\"; x.font = \"500 30px 'Schibsted Grotesk'\";\n  x.save(); if (\"letterSpacing\" in x) x.letterSpacing = \"8px\";\n  x.fillText(\"BUILD NOTHING\", 56, 62); x.restore();\n  x.fillStyle = \"#7C6DB0\"; x.font = \"13px 'Roboto Mono'\";\n  x.fillText(\"A VOW OF ABSTINENCE FROM VIBECODING · WITNESSED ON MONAD\", 56, 92);\n\n  x.textAlign = \"right\";\n  x.fillStyle = broke ? \"#D97757\" : \"#FFAE45\"; x.font = \"500 22px 'Roboto Mono'\";\n  x.fillText(`${formatEther(stake)} MON AT STAKE${broke ? \" — LOST\" : \"\"}`, W - 56, 66);\n  x.fillStyle = \"#7C6DB0\"; x.font = \"13px 'Roboto Mono'\";\n  x.fillText(`VOW #${vowId} · WEEKLY COHORT`, W - 56, 92);\n  x.textAlign = \"left\";\n\n  // day strip: fit within card width\n  const gap = 11;\n  const cell = Math.min(58, Math.floor((W - 112 - (vowDays - 1) * gap) / vowDays));\n  const sy = 190;\n  for (let d = 0; d < vowDays; d++) {\n    const sx = 56 + d * (cell + gap);\n    if (broke && d === cleanDaysN) {\n      x.fillStyle = \"#D97757\";\n      x.shadowColor = \"rgba(217,119,87,0.5)\"; x.shadowBlur = 22;\n      roundRect(x, sx, sy, cell, cell, 10); x.fill();\n      x.shadowBlur = 0;\n      x.strokeStyle = \"#0E091C\"; x.lineWidth = 5; x.lineCap = \"round\";\n      x.beginPath();\n      x.moveTo(sx + 16, sy + 16); x.lineTo(sx + cell - 16, sy + cell - 16);\n      x.moveTo(sx + cell - 16, sy + 16); x.lineTo(sx + 16, sy + cell - 16);\n      x.stroke();\n    } else if (d < cleanDaysN) {\n      x.globalAlpha = 0.66 + 0.34 * (d / Math.max(vowDays - 1, 1));\n      x.fillStyle = \"#DDD7FE\"; roundRect(x, sx, sy, cell, cell, 10); x.fill();\n      x.globalAlpha = 1;\n    } else {\n      x.strokeStyle = \"#2A2046\"; x.lineWidth = 2.5;\n      roundRect(x, sx + 1.5, sy + 1.5, cell - 3, cell - 3, 10); x.stroke();\n    }\n  }\n  x.fillStyle = \"#7C6DB0\"; x.font = \"13px 'Roboto Mono'\";\n  x.fillText(\"ABSTINENCE GRAPH · ONE CELL = ONE DAY WITHOUT CLAUDE CODE\", 56, sy + cell + 38);\n\n  // headline\n  x.fillStyle = \"#FFFFFF\"; x.font = \"600 62px 'Schibsted Grotesk'\";\n  x.fillText(broke ? `Lasted ${hours} hours` : `I built nothing for ${hours} hours`, 54, 430);\n  x.fillStyle = broke ? \"#D97757\" : \"#7C6DB0\"; x.font = \"17px 'Roboto Mono'\";\n  x.fillText(broke\n    ? `day ${cleanDaysN + 1}: claude code session detected. the chain does not forget.`\n    : `${cleanDaysN} of ${vowDays} days clean · the only graph where empty means winning`, 56, 472);\n\n  // stamp\n  const stampText = broke ? \"RELAPSED\" : \"CLEAN\";\n  const color = broke ? \"#D97757\" : \"#85E6FF\";\n  x.save(); x.translate(broke ? 860 : 930, 545); x.rotate(-4 * Math.PI / 180);\n  x.font = \"500 42px 'Roboto Mono'\";\n  const tw = x.measureText(stampText.split(\"\").join(\" \")).width;\n  x.strokeStyle = color; x.lineWidth = 5;\n  roundRect(x, -tw / 2 - 26, -44, tw + 52, 82, 5); x.stroke();\n  x.lineWidth = 1.5; x.globalAlpha = 0.55;\n  roundRect(x, -tw / 2 - 19, -37, tw + 38, 68, 3); x.stroke();\n  x.globalAlpha = 1; x.fillStyle = color; x.textAlign = \"center\";\n  x.fillText(stampText.split(\"\").join(\" \"), 0, 14); x.restore();\n  x.textAlign = \"left\";\n\n  x.fillStyle = \"#7C6DB0\"; x.font = \"14px 'Roboto Mono'\";\n  x.textAlign = \"right\"; x.fillText(\"buildnothing.fun\", W - 56, H - 30); x.textAlign = \"left\";\n  return c;\n}\nfunction roundRect(x, a, b, w, h, r) {\n  x.beginPath(); x.moveTo(a + r, b);\n  x.arcTo(a + w, b, a + w, b + h, r); x.arcTo(a + w, b + h, a, b + h, r);\n  x.arcTo(a, b + h, a, b, r); x.arcTo(a, b, a + w, b, r); x.closePath();\n}\n\n$(\"cardBtn\").onclick = async () => {\n  if (!currentVow) return;\n  await document.fonts.load(\"500 30px 'Schibsted Grotesk'\");\n  await document.fonts.load(\"13px 'Roboto Mono'\");\n  const c = drawCard();\n  const a = document.createElement(\"a\");\n  a.download = `buildnothing-vow-${currentVow.vowId}.png`;\n  a.href = c.toDataURL(\"image/png\");\n  a.click();\n};\n\n$(\"tweetBtn\").onclick = () => {\n  if (!currentVow) return;\n  const hours = Math.floor(Number(currentVow.state[1]) / 3600);\n  const broke = [\"relapsed\", \"slashed\"].includes(STATUS[Number(currentVow.vow[8])]);\n  const text = broke\n    ? `lasted ${hours} hours without claude code. the chain does not forget.\\n\\nbuildnothing.fun · vow #${currentVow.vowId}`\n    : `i built nothing for ${hours} hours. verified by a heartbeat i cannot fake.\\n\\nbuildnothing.fun · vow #${currentVow.vowId}`;\n  window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}`, \"_blank\");\n};\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
