<svg width="1200" height="675" viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="38%" cy="30%" r="90%">
      <stop offset="0%" stop-color="#1A1230"/>
      <stop offset="100%" stop-color="#0E091C"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>

  <!-- purple baseline rail: the chain, always under everything -->
  <rect x="0" y="668" width="1200" height="7" fill="#6E54FF"/>

  <!-- wordmark -->
  <text x="80" y="86" font-family="Inter" font-weight="500" font-size="34"
    letter-spacing="12" fill="#FFFFFF">BUILD NOTHING</text>
  <text x="80" y="116" font-family="Roboto Mono" font-size="16" letter-spacing="3"
    fill="#6E5FA3">/ A VOW OF ABSTINENCE FROM VIBECODING · WITNESSED ON MONAD</text>

  <!-- the count -->
  <path d="M 82.7 158.4
      C 83 186.8, 77 225.2, 77.7 254"
      stroke="#6E5FA3" stroke-width="9" stroke-linecap="round" fill="none"/><path d="M 103.2 157.5
      C 109 186.8, 103 225.2, 108.2 254"
      stroke="#6E5FA3" stroke-width="9" stroke-linecap="round" fill="none"/>

  <line x1="58" y1="146" x2="746" y2="384" stroke="#D97757" stroke-width="13" stroke-linecap="round"/>
  <text x="762" y="392" font-family="Roboto Mono" font-size="15" fill="#D97757" opacity="0.9">— claude was here</text>

  <!-- tally caption -->
  <text x="82" y="280" font-family="Roboto Mono" font-size="15" letter-spacing="2" fill="#6E5FA3">DAYS, COUNTED ON THE WALL</text>

  <!-- headline -->
  <text x="80" y="556" font-family="Inter" font-weight="600"
    font-size="64" fill="#FFFFFF">LASTED 51 HOURS</text>
  <text x="80" y="602" font-family="Roboto Mono" font-size="20"
    fill="#D97757">claude code session detected. the chain does not forget.</text>

  <!-- data column -->
  <g font-family="Roboto Mono" font-size="19" fill="#6E5FA3">
    <text x="1120" y="176" text-anchor="end">/ VOW #7</text>
    <text x="1120" y="210" text-anchor="end" fill="#FFAE45">/ 5 MON AT STAKE</text>
    <text x="1120" y="244" text-anchor="end">/ WEEKLY COHORT</text>
    <text x="1120" y="638" text-anchor="end" font-size="16">buildnothing.fun</text>
  </g>

  <!-- verdict stamp -->
  
  <g transform="translate(742 470) rotate(-6)" opacity="0.96">
    <rect x="-16" y="-50" width="294" height="84" fill="none" stroke="#D97757" stroke-width="6" rx="4"/>
    <rect x="-10" y="-44" width="282" height="72" fill="none" stroke="#D97757" stroke-width="1.5" rx="2" opacity="0.6"/>
    <text x="132" y="13" text-anchor="middle" font-family="Roboto Mono" font-weight="500"
      font-size="50" letter-spacing="8" fill="#D97757">RELAPSED</text>
  </g>
</svg>